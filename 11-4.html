<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Title</title>
	</head>
	<body>
		<script>
        let num1 = Number(prompt("첫 번째 숫자 입력"));
        let num2 = Number(prompt("두 번째 숫자 입력"));

        let operator = prompt("연산자를 입력하세요.");

        switch (operator) {
            case "+":
                alert(`${num1}+${num2}의 계산 결과는 ${num1 + num2}입니다.`);
                break;
            case "-":
                alert(`${num1}-${num2}의 계산 결과는 ${num1 - num2}입니다.`);
                break;
            case "*":
                alert(`${num1}*${num2}의 계산 결과는 ${num1 * num2}입니다.`);
                break;
            case "/":
                if (num2 === 0) {
                    alert("0으로 나눌 수 없습니다.");
                    break;
                }
                alert(`${num1}/${num2}의 계산 결과는 ${num1 / num2}입니다.`);
                break;
            default:
                alert("입력 오류");
                break;
        }
		</script>
	</body>
</html>
