<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Title</title>
	</head>
	<body>
		<script>
        const date = new Date(); // Date 객체 생성: 현재 날짜와 시간 정보를 저장
        const hour = date.getHours(); // 현재 시간을 시 단위로 가져옴 ( 단위: 0-23 )

        if (hour < 11) {                // 현재 시간이 11시 이전이면
            alert("아침 먹을 시간입니다.");
        } else {                        // 11시 이후일 때 다시 조건 검사
            if (hour < 15) {              // 11시 이상, 15시 미만이면
                alert("점심 먹을 시간입나다.");
            } else {                      // 15시 이후라면
                alert("저녁 먹을 시간입니다.");
            }
        }
		</script>
	</body>
</html>
