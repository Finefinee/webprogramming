<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Title</title>
	</head>
	<body>
    <script>
      let num = Number(prompt("숫자 입력"));
      let odd = 0;
      let even = 0;
      for (let i = 1; i <= num; i++) {
        if (i % 2 === 0) {
          odd+=i;
        } else {
          even+=i;
        }
      }
      document.writeln(`짝수 합계: ${even}`);
      document.writeln(`홀수 합계: ${odd}`);
    </script>
	</body>
</html>
